<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | StudySphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .profile-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.1);
            background: #334155;
        }
        .upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .upload-btn:hover { transform: scale(1.1); }
        h1 { margin: 0 0 5px 0; }
        p { color: #94a3b8; margin: 0 0 30px 0; }
        
        .info-group {
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .info-label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; display: block; }
        .info-value { font-size: 1.1rem; font-weight: 500; }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            transition: 0.2s;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="avatar-wrapper">
            <img src="https://via.placeholder.com/150" id="profile-avatar" class="avatar" alt="Profile">
            <button class="upload-btn" onclick="document.getElementById('avatar-input').click()">
                <i class='bx bx-camera'></i>
            </button>
            <input type="file" id="avatar-input" hidden accept="image/*" onchange="uploadAvatar()">
        </div>
        
        <h1 id="profile-name">Loading...</h1>
        <p id="profile-email">...</p>
        
        <div class="info-group">
            <span class="info-label">Role</span>
            <div class="info-value" id="profile-role">Student</div>
        </div>
        <div class="info-group">
            <span class="info-label">Member Since</span>
            <div class="info-value" id="profile-joined">...</div>
        </div>

        <a href="settings.html" class="back-btn">← Back to Settings</a>
    </div>

    <script>
        const API_BASE = (window.location.port === '5500') ? 'http://localhost/practice/' : '';

        // Load Profile
        fetch(API_BASE + 'get_profile.php', { credentials: 'include' })
            .then(res => res.json())
            .then(data => {
                if(data.error) return window.location.href = 'login.html';
                document.getElementById('profile-name').textContent = data.username;
                document.getElementById('profile-email').textContent = data.email;
                document.getElementById('profile-role').textContent = data.role;
                document.getElementById('profile-joined').textContent = new Date(data.created_at).toLocaleDateString();
                if(data.avatar) document.getElementById('profile-avatar').src = data.avatar;
            });

        function uploadAvatar() {
            const file = document.getElementById('avatar-input').files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('avatar', file);

            fetch(API_BASE + 'upload_avatar.php', {
                method: 'POST',
                credentials: 'include',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('profile-avatar').src = data.avatar_url;
                    localStorage.setItem('avatar', data.avatar_url); // Update local storage
                    alert('Avatar updated!');
                } else {
                    alert('Upload failed: ' + data.message);
                }
            });
        }
    </script>
</body>
</html>
